# .goreleaser.yml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w  # Strip debug info
    main: .

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}@{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

changelog:
  sort: desc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

winget:
  - name: vizb
    publisher: fahimfaisaal
    short_description: "Multi-language benchmark visualization CLI"
    repository:
      owner: goptics
      name: winget-pkgs
    description: "Transform benchmark output from Go (go test -bench), Rust (cargo bench via Criterion/Divan), and JavaScript (Vitest/Tinybench) into interactive 4D HTML visualizations."
    homepage: https://vizb.goptics.org
    license: MIT
