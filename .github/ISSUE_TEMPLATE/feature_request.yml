name: Feature Request
description: Suggest an idea for Vizb
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve. Feature requests with a concrete use case are easier to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to accomplish? What workflow is painful today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like Vizb to behave? (Optional — a use case alone is fine.)
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you've tried or other tools you've looked at.