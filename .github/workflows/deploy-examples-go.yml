name: deploy-go-examples
on:
  push:
    branches: [main]
    paths:
      - examples/go/**
      - action.yml
      - .github/workflows/deploy-examples-go.yml
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

jobs:
  convert:
    name: Convert Go Benchmarks
    strategy:
      matrix:
        include:
          - id: 00-http-routing
            file: http-routing
            name: "HTTP Routing"
            description: "Performance comparison of popular Go HTTP routers"
            group-pattern: x_y
            charts: line
            chart: "line:sort=asc,scale=log"

          - id: 01-decode
            file: decode-encode
            name: "Decode"
            description: "Decode performance across text, level, and size"
            group-regex: "/text=(?<n>.*)/level=(?<x>.*)/size=(?<y>.*)"
            filter: "Decode"

          - id: 02-encode
            file: decode-encode
            name: "Encode"
            description: "Encode performance across text, level, and size"
            group-regex: "/text=(?<n>.*)/level=(?<x>.*)/size=(?<y>.*)"
            filter: "Encode"

          - id: 03-hash
            file: hash
            name: "Hashing"
            description: "Comparison of different hash functions"
            group-regex: "Hashing64(?<x>.*)"

          - id: 04-serialization
            file: serialization
            name: "Serialization"
            description: "Comparison of different serialization methods"
            group-regex: "(?<x>.*)By(?<y>.*)"

          - id: 05-validator
            file: validator
            name: "Validator"
            description: "Validation success vs failure across rule sets"
            group-regex: "(?<y>.*?)(?:(?<x>Success|Failure)(?<n>.*)|$)"

          - id: 06-varmq
            file: varmq
            name: "Varmq"
            description: "Variadic queue benchmark"
            group-pattern: x/y

          - id: 07-worker-pools
            file: worker-pools
            name: "Worker Pools"
            description: "Performance comparison of different worker pool implementations"
            group-pattern: n/y/x

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: ${{ matrix.name }}
        uses: ./
        with:
          file: examples/go/${{ matrix.file }}.txt
          id: ${{ matrix.id }}
          name: ${{ matrix.name }}
          description: ${{ matrix.description }}
          group-pattern: ${{ matrix.group-pattern }}
          group-regex: ${{ matrix.group-regex }}
          filter: ${{ matrix.filter }}
          chart: |
            bar:scale=log,sort=asc
            line:scale=log,sort=asc
            pie:sort=asc
          output-json: ${{ matrix.id }}.json
          vizb-binary: ${{ env.ACT == 'true' && './bin/vizb' || '' }}

      - name: Stage json for local merge
        if: env.ACT == 'true'
        run: mkdir -p .act/jsons && cp ${{ matrix.id }}.json .act/jsons/

      - name: Uploading json artifacts
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: json-${{ matrix.id }}
          path: ${{ matrix.id }}.json

  merge-deploy:
    name: Merge and Deploy Go Benchmarks
    needs: convert
    permissions:
      contents: write
    uses: ./.github/workflows/merge-deploy-examples.yml
    with:
      language: go
