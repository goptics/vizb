name: deploy-go-examples
on:
  push:
    branches: [main]
    paths:
      - examples/go/**
      - action.yml
      - .github/workflows/test-action.yml
      - .github/workflows/deploy-examples-go.yml
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test-action.yml

  convert:
    needs: test
    strategy:
      matrix:
        include:
          - output: hash
            bench-file: hash.txt
            name: "Hashing"
            description: "Comparison of different hash functions"
            group-regex: "Hashing64(?<x>.*)"
            scale: "log"

          - output: http-routing
            bench-file: http-routing.txt
            name: "HTTP Routing"
            description: "Performance comparison of popular Go HTTP Routers"
            group-pattern: "x_n"
            scale: "log"

          - output: worker-pools
            bench-file: worker-pools.txt
            name: "Worker Pools"
            description: "Performance comparison of different worker pool implementations"
            group-pattern: "n/y/x"

          - output: varmq
            bench-file: varmq.txt
            name: "Varmq"
            description: "Variadic Queue Benchmark"
            group-pattern: "x/y"
            scale: "log"

          - output: serialization
            bench-file: serialization.txt
            name: "Serialization"
            description: "Comparison of different serialization methods"
            group-regex: "(?<x>.*)By(?<y>.*)"
            scale: "log"

          - output: validator
            bench-file: validator.txt
            name: "Validator"
            description: ""
            group-regex: "(?<y>.*?)(?:(?<x>Success|Failure)(?<n>.*)|$)"
            scale: "log"

          - output: decode
            bench-file: decode-encode.txt
            name: "Decode"
            description: "Decode Performance Comparison"
            group-regex: "/text=(?<n>.*)/level=(?<x>.*)/size=(?<y>.*)"
            filter: "Decode"
            scale: "log"

          - output: encode
            bench-file: decode-encode.txt
            name: "Encode"
            description: "Encode Performance Comparison"
            group-regex: "/text=(?<n>.*)/level=(?<x>.*)/size=(?<y>.*)"
            filter: "Encode"
            scale: "log"

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ${{ matrix.name }}
        uses: ./
        with:
          bench-file: examples/go/${{ matrix.bench-file }}
          name: ${{ matrix.name }}
          description: ${{ matrix.description }}
          group-pattern: ${{ matrix.group-pattern }}
          group-regex: ${{ matrix.group-regex }}
          filter: ${{ matrix.filter }}
          scale: ${{ matrix.scale }}
          output-json: ${{ matrix.output }}.json
          sort: asc

      - name: Uploading json artifacts
        uses: actions/upload-artifact@v4
        with:
          name: json-${{ matrix.output }}
          path: ${{ matrix.output }}.json

  merge-deploy:
    needs: convert
    permissions:
      contents: write
    uses: ./.github/workflows/merge-deploy-examples.yml
    with:
      language: go
