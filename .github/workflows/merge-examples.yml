name: Merge Examples
on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
        description: "Language subdirectory under examples/ (e.g. go, javascript, rust)"
      publish:
        required: false
        type: boolean
        default: false
        description: "Publish the generated example page immediately"

jobs:
  merge:
    name: Merge ${{ inputs.language }} examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Downloading json artifacts
        if: env.ACT != 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: json-${{ inputs.language }}-*
          path: /tmp/jsons
          merge-multiple: true

      - name: Collect local json artifacts
        if: env.ACT == 'true'
        run: |
          mkdir -p /tmp/jsons
          cp .act/jsons/*.json /tmp/jsons/

      - name: Prepare output directory
        run: mkdir -p dist/examples/${{ inputs.language }}

      - name: Merging
        uses: ./
        with:
          merge-dir: /tmp/jsons
          output-html: dist/examples/${{ inputs.language }}/index.html
          vizb-binary: ${{ env.ACT == 'true' && './bin/vizb' || '' }}

      - name: Local preview ready
        if: env.ACT == 'true'
        run: echo "::notice::Local preview at dist/examples/${{ inputs.language }}/index.html"

      - name: Upload example site
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: site-examples-${{ inputs.language }}
          path: dist
          if-no-files-found: error

  publish:
    name: Publish ${{ inputs.language }} examples
    if: inputs.publish
    needs: merge
    permissions:
      contents: write
    uses: ./.github/workflows/publish-site.yml
    with:
      artifact_pattern: site-examples-${{ inputs.language }}
      keep_files: true
