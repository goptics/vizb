name: merge-deploy-examples
on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
        description: "Language subdirectory under examples/ (e.g. go, javascript, rust)"

jobs:
  merge-deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Downloading json artifacts
        if: env.ACT != 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: json-*
          path: /tmp/jsons
          merge-multiple: true

      - name: Collect local json artifacts
        if: env.ACT == 'true'
        run: |
          mkdir -p /tmp/jsons
          cp .act/jsons/*.json /tmp/jsons/

      - name: Prepare output directory
        run: mkdir -p dist/examples/${{ inputs.language }}

      - name: Merging
        uses: ./
        with:
          merge-dir: /tmp/jsons
          output-html: dist/examples/${{ inputs.language }}/index.html
          vizb-binary: ${{ env.ACT == 'true' && './bin/vizb' || '' }}

      - name: Local preview ready
        if: env.ACT == 'true'
        run: echo "::notice::Local preview at dist/examples/${{ inputs.language }}/index.html"

      - name: Deploying to Github pages
        if: env.ACT != 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: website
          publish_dir: dist
          keep_files: true
