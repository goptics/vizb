name: deploy-json-examples
on:
  push:
    branches: [main]
    paths:
      - examples/json/**
      - action.yml
      - .github/workflows/deploy-examples-json.yml
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

jobs:
  convert:
    name: Convert JSON Data
    strategy:
      matrix:
        include:
          - output: 00-sales
            file: sales
            name: "Sales by Product"
            description: "Grouped bar chart by product, region, and category"
            group: "product,region,category"
            group-pattern: n,x,y
            charts: bar,line,pie

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ${{ matrix.name }}
        uses: ./
        with:
          file: examples/json/${{ matrix.file }}.json
          name: ${{ matrix.name }}
          description: ${{ matrix.description }}
          group: ${{ matrix.group }}
          group-pattern: ${{ matrix.group-pattern }}
          charts: ${{ matrix.charts }}
          chart: |
            bar:scale=log,sort=asc
            line:scale=log,sort=asc
            pie:sort=asc
          output-json: ${{ matrix.output }}.json

      - name: Uploading json artifacts
        uses: actions/upload-artifact@v4
        with:
          name: json-${{ matrix.output }}
          path: ${{ matrix.output }}.json

  merge-deploy:
    name: Merge and Deploy JSON Data
    needs: convert
    permissions:
      contents: write
    uses: ./.github/workflows/merge-deploy-examples.yml
    with:
      language: json
