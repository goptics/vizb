name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GORELEASER_TOKEN }}
          approvers: fahimfaisaal
          minimum-approvals: 1
          issue-title: 'Release Approval: ${{ github.ref_name }}'
          issue-body: |
            A new release tag `${{ github.ref_name }}` has been pushed.

            **What will happen after approval:**
            - GoReleaser builds binaries for linux/darwin/windows (amd64 + arm64)
            - Release is published to GitHub Releases
            - A PR is auto-submitted to microsoft/winget-pkgs
            - Examples at https://goptics.github.io/vizb/examples/ are auto-redeployed

  goreleaser:
    needs: approve
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_TOKEN }}

  deploy-docs:
    needs: goreleaser
    uses: ./.github/workflows/deploy-docs.yml
    secrets: inherit
    permissions:
      contents: write
