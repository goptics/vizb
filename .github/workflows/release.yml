name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: trstringer/manual-approval@v1
        with:
          # Issue creation uses workflow permissions (issues: write). GORELEASER_TOKEN
          # is a release PAT and often lacks Issues scope — that causes 403 on POST /issues.
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: fahimfaisaal
          minimum-approvals: 1
          issue-title: 'Release Approval: ${{ github.ref_name }}'
          issue-body: |
            A new release tag `${{ github.ref_name }}` has been pushed.

            **What will happen after approval:**
            - GoReleaser builds binaries for linux/darwin/windows (amd64 + arm64)
            - Release is published to GitHub Releases
            - A PR is auto-submitted to microsoft/winget-pkgs
            - Examples at https://goptics.github.io/vizb/examples/ are auto-redeployed

  cli:
    name: CLI
    needs: approve
    uses: ./.github/workflows/cli.yml

  ui:
    name: UI
    needs: approve
    uses: ./.github/workflows/ui.yml

  api-contract:
    name: API Contract
    needs: approve
    uses: ./.github/workflows/api-contract.yml

  goreleaser:
    needs: [cli, ui, api-contract]
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download embedded UI
        uses: actions/download-artifact@v8
        with:
          name: cli-embedded-ui-${{ github.sha }}
          path: pkg/template

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # Workflow GITHUB_TOKEN has contents:write. A PAT in GORELEASER_TOKEN often
          # lacks release scope (403 on POST /releases). Releases created with the
          # default token do not re-fire `on: release` workflows, so winget runs below.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  winget:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: goptics.vizb
          installers-regex: '\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

  prepare-docs:
    name: Prepare Docs
    needs: goreleaser
    uses: ./.github/workflows/deploy-docs.yml
    permissions:
      contents: write

  prepare-tabular-data-examples:
    name: Prepare Tabular Data Examples
    needs: goreleaser
    uses: ./.github/workflows/prepare-tabular-data-examples.yml
    permissions:
      contents: write

  prepare-math-and-3d-examples:
    name: Prepare Math & 3D Examples
    needs: goreleaser
    uses: ./.github/workflows/prepare-math-and-3d-examples.yml
    permissions:
      contents: write

  prepare-comparisons-examples:
    name: Prepare Comparisons Examples
    needs: goreleaser
    uses: ./.github/workflows/prepare-comparisons-examples.yml
    permissions:
      contents: write

  prepare-github-legends:
    name: Prepare GitHub Legends
    needs: goreleaser
    uses: ./.github/workflows/prepare-github-legends.yml
    permissions:
      contents: write

  prepare-go-examples:
    name: Prepare Go Examples
    needs: goreleaser
    uses: ./.github/workflows/prepare-go-examples.yml
    permissions:
      contents: write

  prepare-javascript-examples:
    name: Prepare JavaScript Examples
    needs: goreleaser
    uses: ./.github/workflows/prepare-javascript-examples.yml
    permissions:
      contents: write

  prepare-rust-examples:
    name: Prepare Rust Examples
    needs: goreleaser
    uses: ./.github/workflows/prepare-rust-examples.yml
    permissions:
      contents: write

  publish-site:
    name: Publish Site
    needs:
      - prepare-docs
      - prepare-tabular-data-examples
      - prepare-math-and-3d-examples
      - prepare-comparisons-examples
      - prepare-github-legends
      - prepare-go-examples
      - prepare-javascript-examples
      - prepare-rust-examples
    permissions:
      contents: write
    uses: ./.github/workflows/publish-site.yml
    with:
      artifact_pattern: site-*
      keep_files: false
