name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - uses: trstringer/manual-approval@v1
        with:
          # Issue creation uses workflow permissions (issues: write). GORELEASER_TOKEN
          # is a release PAT and often lacks Issues scope — that causes 403 on POST /issues.
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: fahimfaisaal
          minimum-approvals: 1
          issue-title: 'Release Approval: ${{ github.ref_name }}'
          issue-body: |
            A new release tag `${{ github.ref_name }}` has been pushed.

            **What will happen after approval:**
            - GoReleaser builds binaries for linux/darwin/windows (amd64 + arm64)
            - Release is published to GitHub Releases
            - A PR is auto-submitted to microsoft/winget-pkgs
            - Docs and live examples at https://vizb.goptics.org/examples/live/ are rebuilt and published

  cli:
    name: CLI
    needs: approve
    uses: ./.github/workflows/cli.yml

  ui:
    name: UI
    needs: approve
    uses: ./.github/workflows/ui.yml

  api-contract:
    name: API Contract
    needs: approve
    uses: ./.github/workflows/api-contract.yml

  goreleaser:
    needs: [cli, ui, api-contract]
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download embedded UI
        uses: actions/download-artifact@v8
        with:
          name: cli-embedded-ui-${{ github.sha }}
          path: pkg/template

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # Workflow GITHUB_TOKEN has contents:write. A PAT in GORELEASER_TOKEN often
          # lacks release scope (403 on POST /releases). Releases created with the
          # default token do not re-fire `on: release` workflows, so winget runs below.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  winget:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: goptics.vizb
          installers-regex: '\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}

  docs:
    name: Prepare Docs
    needs: goreleaser
    uses: ./.github/workflows/deploy-docs.yml
    permissions:
      contents: write

  # prepare-only (workflow_call publish defaults false); final publish-site deploys all site-* artifacts
  tabular-data-examples:
    name: "Examples: Tabular Data"
    needs: goreleaser
    uses: ./.github/workflows/tabular-data-examples.yml
    permissions:
      contents: write

  math-and-3d-examples:
    name: "Examples: Math & 3D"
    needs: goreleaser
    uses: ./.github/workflows/math-and-3d-examples.yml
    permissions:
      contents: write

  comparisons-examples:
    name: "Examples: Comparisons"
    needs: goreleaser
    uses: ./.github/workflows/comparisons-examples.yml
    permissions:
      contents: write

  github-legends:
    name: "Examples: GitHub Legends"
    needs: goreleaser
    uses: ./.github/workflows/github-legends.yml
    permissions:
      contents: write

  go-examples:
    name: "Examples: Go"
    needs: goreleaser
    uses: ./.github/workflows/go-examples.yml
    permissions:
      contents: write

  javascript-examples:
    name: "Examples: JavaScript"
    needs: goreleaser
    uses: ./.github/workflows/javascript-examples.yml
    permissions:
      contents: write

  rust-examples:
    name: "Examples: Rust"
    needs: goreleaser
    uses: ./.github/workflows/rust-examples.yml
    permissions:
      contents: write

  publish-site:
    name: Publish Site
    needs:
      - docs
      - tabular-data-examples
      - math-and-3d-examples
      - comparisons-examples
      - github-legends
      - go-examples
      - javascript-examples
      - rust-examples
    permissions:
      contents: write
    uses: ./.github/workflows/publish-site.yml
    with:
      artifact_pattern: site-*
      keep_files: false
