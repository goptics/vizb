name: deploy-javascript-examples
on:
  push:
    branches: [main]
    paths:
      - examples/javascript/**
      - action.yml
      - .github/workflows/test-action.yml
      - .github/workflows/deploy-examples-javascript.yml
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test-action.yml

  convert:
    name: Convert Javascript Benchmarks
    needs: test
    strategy:
      matrix:
        include:
          - output: 00-tinybench
            bench-file: 00-tinybench
            name: "Bubble Vs Insertion Sort (tinybench)"
            group-pattern: x/y
            parser: js:tinybench

          - output: 01-vitest
            bench-file: 01-vitest
            name: "Bubble Vs Insertion Sort (vitest)"
            group-regex: "n=(?<y>.*)/(?<x>.*)"
            parser: js:vitest

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ${{ matrix.name }}
        uses: ./
        with:
          bench-file: examples/javascript/${{ matrix.bench-file }}.txt
          name: ${{ matrix.name }}
          group-pattern: ${{ matrix.group-pattern }}
          group-regex: ${{ matrix.group-regex }}
          output-json: ${{ matrix.output }}.json
          parser: ${{matrix.parser}}
          sort: asc

      - name: Uploading json artifacts
        uses: actions/upload-artifact@v4
        with:
          name: json-${{ matrix.output }}
          path: ${{ matrix.output }}.json

  merge-deploy:
    name: Merge Javascript Benchmarks
    needs: convert
    permissions:
      contents: write
    uses: ./.github/workflows/merge-deploy-examples.yml
    with:
      language: javascript
