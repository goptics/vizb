name: CLI

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - '**.go'
      - go.mod
      - go.sum
      - .goreleaser.yml
      - action.yml
      - .github/workflows/action-ci.yml
      - .github/workflows/cli.yml
      - .github/actions/setup-embed-ui/**
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - go.mod
      - go.sum
      - .goreleaser.yml
      - action.yml
      - .github/workflows/action-ci.yml
      - .github/workflows/cli.yml
      - .github/actions/setup-embed-ui/**

jobs:
  embed-ui:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup embed UI
        uses: ./.github/actions/setup-embed-ui

      - name: Upload embedded UI
        uses: actions/upload-artifact@v7
        with:
          name: cli-embedded-ui-${{ github.sha }}
          path: pkg/template/vizb-ui.gen.go
          if-no-files-found: error

  lint:
    needs: embed-ui
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download embedded UI
        uses: actions/download-artifact@v8
        with:
          name: cli-embedded-ui-${{ github.sha }}
          path: pkg/template

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  format:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

  test:
    needs: embed-ui
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download embedded UI
        uses: actions/download-artifact@v8
        with:
          name: cli-embedded-ui-${{ github.sha }}
          path: pkg/template

      - run: go mod download

      - run: go test -count=1 -coverpkg=./... -coverprofile=coverage.txt -covermode=atomic ./...

      - uses: codecov/codecov-action@v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.txt

  action:
    needs: [lint, format, test]
    uses: ./.github/workflows/action-ci.yml
