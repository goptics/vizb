name: CLI

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - go.mod
      - go.sum
      - action.yml
      - .github/workflows/action-ci.yml
      - .github/workflows/cli.yml
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - go.mod
      - go.sum
      - action.yml
      - .github/workflows/action-ci.yml
      - .github/workflows/cli.yml

jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64

  format:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - run: go mod download

      - run: go test -coverprofile=coverage.txt -covermode=atomic ./...

      - uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.txt

  action:
    needs: [lint, format, test]
    uses: ./.github/workflows/action-ci.yml