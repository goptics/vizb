name: action
on:
  workflow_call:
  workflow_dispatch:

jobs:
  stateless:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        if: env.ACT != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build vizb
        if: env.ACT != 'true'
        run: go build -o ./bin/vizb .

      - name: Run action (stateless)
        uses: ./
        with:
          file: examples/go/01-hash.txt
          output-html: index.html
          vizb-binary: ./bin/vizb

  stateful:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        if: env.ACT != 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build vizb
        if: env.ACT != 'true'
        run: go build -o ./bin/vizb .

      - name: Generate previous JSON
        uses: ./
        with:
          name: Hash
          file: examples/go/01-hash.txt
          output-json: results/prev/hash.json
          vizb-binary: ./bin/vizb

      - name: Run action (stateful)
        uses: ./
        with:
          name: HTTP Frameworks Comparisons
          group-pattern: x_n
          sort: asc
          file: examples/go/02-http-routing.txt
          merge-dir: results/prev
          output-html: index.html
          output-json: results/bench.json
          vizb-binary: ./bin/vizb