name: deploy-rust-examples
on:
  push:
    branches: [main]
    paths:
      - examples/rust/**
      - action.yml
      - .github/workflows/deploy-examples-rust.yml
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:

jobs:
  convert:
    name: Convert Rust Benchmarks
    strategy:
      matrix:
        include:
          - output: 00-criterion
            file: 00-criterion
            name: "Bubble vs Insertion Sort (Criterion)"
            description: "Criterion.rs output — algorithm on X, input size on Y"
            group-regex: "(?<x>.*)/n=(?<y>.*)"

          - output: 01-divan
            file: 01-divan
            name: "Bubble vs Insertion Sort (Divan)"
            description: "Divan output — algorithm and input size from group pattern"
            group-pattern: x__y

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: ${{ matrix.name }}
        uses: ./
        with:
          file: examples/rust/${{ matrix.file }}.txt
          name: ${{ matrix.name }}
          description: ${{ matrix.description }}
          group-pattern: ${{ matrix.group-pattern }}
          group-regex: ${{ matrix.group-regex }}
          chart: |
            bar:scale=log,sort=asc
            line:scale=log,sort=asc
            pie:sort=asc
          output-json: ${{ matrix.output }}.json
          vizb-binary: ${{ env.ACT == 'true' && './bin/vizb' || '' }}

      - name: Stage json for local merge
        if: env.ACT == 'true'
        run: mkdir -p .act/jsons && cp ${{ matrix.output }}.json .act/jsons/

      - name: Uploading json artifacts
        if: env.ACT != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: json-${{ matrix.output }}
          path: ${{ matrix.output }}.json

  merge-deploy:
    name: Merge and Deploy Rust Benchmarks
    needs: convert
    permissions:
      contents: write
    uses: ./.github/workflows/merge-deploy-examples.yml
    with:
      language: rust
