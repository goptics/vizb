name: UI

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/ui.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/ui.yml'

jobs:
  lint:
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  format:
    needs: lint
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

  test:
    needs: format
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  build:
    needs: test
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: pnpm install --frozen-lockfile
        working-directory: ui

      - run: EMBED_UI=True pnpm build
        working-directory: ui

      - run: gofmt -w pkg/template/vizb-ui.gen.go

      - name: Verify vizb-ui.gen.go is committed
        run: |
          if ! git diff --quiet -- pkg/template/vizb-ui.gen.go; then
            echo "::error::pkg/template/vizb-ui.gen.go is out of sync. Run: task build:ui && git add pkg/template/vizb-ui.gen.go"
            git diff -- pkg/template/vizb-ui.gen.go
            exit 1
          fi