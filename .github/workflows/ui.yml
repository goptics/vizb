name: UI

on:
  push:
    paths:
      - 'ui/**'
      - 'pkg/template/vizb-ui.gen.go'
      - '.github/workflows/ui.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ui/**'
      - 'pkg/template/vizb-ui.gen.go'
      - '.github/workflows/ui.yml'

jobs:
  lint:
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

  format:
    needs: lint
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

  test:
    needs: format
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  build:
    needs: test
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: pnpm install --frozen-lockfile
        working-directory: ui

      - run: EMBED_UI=True pnpm build
        working-directory: ui

      - name: Verify vizb-ui.gen.go is committed
        run: |
          git show HEAD:pkg/template/vizb-ui.gen.go > /tmp/vizb-ui.gen.go.committed
          gofmt -w /tmp/vizb-ui.gen.go.committed pkg/template/vizb-ui.gen.go
          node embed-build/verify-gen-sync.ts /tmp/vizb-ui.gen.go.committed ../pkg/template/vizb-ui.gen.go
        working-directory: ui