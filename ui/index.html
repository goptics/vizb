<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vizb</title>
  </head>
  <body>
    <div id="app">
      <!-- Static pre-hydration splash: paints immediately (the app module is
           deferred), so the screen is never blank during JS parse. Vue mounts
           over #app and replaces this. Inline-only, zero dependencies. -->
      <div
        id="vizb-splash"
        aria-hidden="true"
        style="
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #fff;
        "
      >
        <div
          style="
            width: 38px;
            height: 38px;
            border: 3px solid #e5e7eb;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: vizb-spin 0.7s linear infinite;
          "
        ></div>
      </div>
      <style>
        @keyframes vizb-spin {
          to {
            transform: rotate(360deg);
          }
        }
        @media (prefers-color-scheme: dark) {
          #vizb-splash {
            background: #0a0a0a !important;
          }
          #vizb-splash div {
            border-color: #27272a;
            border-top-color: #818cf8;
          }
        }
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
