<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vizb</title>
    <script>
      // Apply the theme class before first paint so the pre-hydration skeleton
      // renders in the correct theme (no light flash) — mirrors the dark-mode
      // init in useSettingsStore. Classic inline script: zero dependencies.
      ;(function () {
        try {
          var s = localStorage.getItem('dark-mode')
          var dark = s !== null ? s === 'true' : matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.classList.add(dark ? 'dark' : 'light')
        } catch (e) {
          document.documentElement.classList.add('light')
        }
      })()
    </script>
  </head>
  <body>
    <div id="app">
      <!-- Static pre-hydration skeleton: paints immediately (the app module is
           deferred), so the screen is never blank during JS parse. Mirrors
           LoadingSkeleton.vue using the same Tailwind classes (the inlined CSS
           is in <head>, so it's styled from first paint). Vue mounts over #app
           and replaces this. -->
      <div class="mx-auto min-h-screen max-w-7xl animate-pulse px-4 py-8 sm:px-6 lg:px-8">
        <header class="space-y-3 py-5 text-center">
          <div class="mx-auto h-9 w-64 rounded-md bg-muted"></div>
          <div class="flex justify-center">
            <div class="h-6 w-28 rounded-full bg-muted"></div>
          </div>
          <div class="flex justify-center">
            <div class="h-6 w-24 rounded-full bg-muted"></div>
          </div>
          <div class="mx-auto h-4 w-48 rounded bg-muted"></div>
        </header>
        <div class="space-y-5">
          <div class="rounded-lg border border-border bg-card p-6 shadow-sm">
            <div class="mb-4 h-5 w-40 rounded bg-muted"></div>
            <div class="h-[500px] rounded bg-muted"></div>
          </div>
          <div class="rounded-lg border border-border bg-card p-6 shadow-sm">
            <div class="mb-4 h-5 w-40 rounded bg-muted"></div>
            <div class="h-[500px] rounded bg-muted"></div>
          </div>
          <div class="rounded-lg border border-border bg-card p-6 shadow-sm">
            <div class="mb-4 h-5 w-40 rounded bg-muted"></div>
            <div class="h-[500px] rounded bg-muted"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
