version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  init:
    desc: Install all dependencies
    cmds:
      - go mod tidy
      - go mod download
      - cd ui; pnpm install; cd -
      - cd docs; pnpm install; cd -
      - task: act:install
      - go run github.com/evilmartians/lefthook@latest install

  dev:docs:
    desc: Run docs dev server on localhost:4321
    cmds:
      - cd docs; pnpm dev --open; cd -

  dev:ui:
    desc: Run development UI server
    cmds:
      - cd ui; pnpm dev --open

  build:docs:
    desc: Build docs for production
    cmds:
      - cd docs; pnpm build; cd -

  build:ui:
    desc: Build Vue UI template
    cmds:
      - cd ui; SINGLEFILE=True pnpm build; cd -

  build:cli:
    desc: Build the binary (production-ready, stripped)
    cmds:
      - go build -ldflags="-s -w" -o ./bin/vizb

  build:
    desc: Build the Docs, UI & binary
    cmds:
      - task: build:docs
      - task: build:ui
      - task: build:cli

  preview:docs:
    desc: Preview production build locally
    cmds:
      - task: build:docs
      - cd docs; pnpm preview; cd -

  test:
    desc: Run all tests (no cache)
    cmds:
      - go test -count=1 ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  format:
    desc: Format codes
    cmds:
      - gofmt -w .
      - cd ui; pnpm format; cd -

  release:check:
    desc: Check Goreleaser configuration
    cmds:
      - goreleaser check

  release:snapshot:
    desc: Create a snapshot release
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Create and push a new tag to trigger release
    prompt: This will create and push a new release tag. Continue?
    vars:
      VERSION: "{{.CLI_ARGS}}"
    cmds:
      - task: release:check
      - task: release:snapshot
      - echo "Creating tag {{.VERSION}}..."
      - git tag -s {{.VERSION}} -m "Release {{.VERSION}}"
      - git push origin {{.VERSION}}
      - echo "Tag {{.VERSION}} pushed. GitHub Actions will create the release."

  # ── Act: Local GitHub Actions Testing ──────────────────────

  act:install:
    desc: Install act for local GitHub Actions testing
    cmds:
      - (which act && echo "act already installed") || (echo "Installing act..." && go install github.com/nektos/act@latest)

  act:check:
    desc: Verify act is installed
    cmds:
      - which act || (echo "act not found. Run 'task act:install' first" && exit 1)

  act:test:stateless:
    desc: Test action in stateless mode (bench file → HTML)
    cmds:
      - task: act:check
      - act --bind workflow_dispatch -W .github/workflows/test-action.yml --job stateless --matrix os:ubuntu-latest

  act:test:stateful:
    desc: Test action in stateful mode (merge + HTML + JSON)
    cmds:
      - task: act:check
      - act --bind workflow_dispatch -W .github/workflows/test-action.yml --job stateful --matrix os:ubuntu-latest

  act:clean:
    desc: Clean up act test artifacts
    cmds:
      - rm -rf bench*.json index.html results/ bench-input.txt

  # ── Homebrew Testing ──────────────────────────────────────────

  brew:test:
    desc: Build, test, and audit vizb Homebrew formula in a disposable tap
    dir: "{{.USER_WORKING_DIR}}"
    vars:
      TAP_OWNER: fahimfaisaal
      TAP_NAME: vizb-test
      TAP: "{{.TAP_OWNER}}/homebrew-{{.TAP_NAME}}"
      TAP_REF: "{{.TAP_OWNER}}/{{.TAP_NAME}}"
    cmds:
      - brew tap-new {{.TAP}} 2>/dev/null || true
      - cp vizb.rb $(brew --repository)/Library/Taps/{{.TAP_OWNER}}/homebrew-{{.TAP_NAME}}/Formula/
      - HOMEBREW_NO_INSTALL_FROM_API=1 brew install --build-from-source {{.TAP_REF}}/vizb
      - brew test {{.TAP_REF}}/vizb
      - brew audit --new {{.TAP_REF}}/vizb
      - vizb -v
      - brew uninstall {{.TAP_REF}}/vizb
      - brew untap {{.TAP}}
