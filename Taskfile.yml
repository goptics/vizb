version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  init:
    desc: Install all dependencies and generate the UI embed
    cmds:
      - go mod tidy
      - go mod download
      - cd ui; pnpm install; cd -
      - cd docs; pnpm install; cd -
      - task: build:ui
      - task: act:install
      - go run github.com/evilmartians/lefthook@latest install

  dev:docs:
    desc: Run docs dev server on localhost:4321
    cmds:
      - cd docs; pnpm dev --open; cd -

  dev:ui:
    desc: Run development UI server
    cmds:
      - cd ui; pnpm dev --open

  build:docs:
    desc: Build docs for production
    cmds:
      - cd docs; [ -d node_modules ] || pnpm install; pnpm build; cd -

  build:ui:
    desc: Build Vue UI template
    cmds:
      - cd ui; [ -d node_modules ] || pnpm install; EMBED_UI=True pnpm build; cd -

  build:cli:
    desc: Build the binary (production-ready, stripped)
    cmds:
      - go build -ldflags="-s -w" -o ./bin/vizb

  build:
    desc: Build the Docs, UI & binary
    cmds:
      - task: build:docs
      - task: build:ui
      - task: build:cli

  preview:docs:
    desc: Preview production build locally
    cmds:
      - task: build:docs
      - cd docs; pnpm preview; cd -

  test:
    desc: Run all tests (no cache)
    cmds:
      - go test -count=1 ./...
      - cd ui; pnpm test; cd -

  # Pragmatic Go coverage (excludes main.go, vizb-ui.gen.go, pkg/style from review).
  test:cover:
    desc: Go cross-package coverage report
    cmds:
      - go test -count=1 -coverpkg=./... -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out | tail -1

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  format:
    desc: Format codes
    cmds:
      - gofmt -w .
      - cd ui; [ -d node_modules ] || pnpm install; pnpm format; cd -

  release:check:
    desc: Check Goreleaser configuration
    cmds:
      - goreleaser check

  release:snapshot:
    desc: Create a snapshot release
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Create and push a new tag to trigger release
    prompt: This will create and push a new release tag. Continue?
    vars:
      VERSION: "{{.CLI_ARGS}}"
    cmds:
      - task: release:check
      - task: release:snapshot
      - echo "Creating tag {{.VERSION}}..."
      - git tag -s {{.VERSION}} -m "Release {{.VERSION}}"
      - git push origin {{.VERSION}}
      - echo "Tag {{.VERSION}} pushed. GitHub Actions will create the release."

  release:remove:
    desc: Remove a botched release (GitHub release + local and remote tag)
    prompt: Delete release/tag {{.VERSION}} on GitHub and locally?
    vars:
      VERSION: "{{.CLI_ARGS}}"
    cmds:
      - |
        test -n "{{.VERSION}}" || { echo "Usage: task release:remove -- v1.2.3"; exit 1; }
      - gh release delete "{{.VERSION}}" --yes --cleanup-tag 2>/dev/null || true
      - git push origin --delete "{{.VERSION}}" 2>/dev/null || true
      - git tag -d "{{.VERSION}}" 2>/dev/null || true
      - echo "Removed {{.VERSION}} (GitHub release and tags, where present)"

  # ── Act: Local GitHub Actions Testing ──────────────────────

  act:install:
    desc: Install act for local GitHub Actions testing
    cmds:
      - (which act && echo "act already installed") || (echo "Installing act..." && go install github.com/nektos/act@latest)

  act:check:
    desc: Verify act is installed
    cmds:
      - which act || (echo "act not found. Run 'task act:install' first" && exit 1)

  act:test:stateless:
    desc: Test action in stateless mode (bench file → HTML)
    deps: [build:cli]
    cmds:
      - task: act:check
      - act --bind --container-options "--user $(id -u):$(id -g)" workflow_dispatch -W .github/workflows/action-ci.yml --job stateless --matrix os:ubuntu-latest

  act:test:stateful:
    desc: Test action in stateful mode (merge + HTML + JSON)
    deps: [build:cli]
    cmds:
      - task: act:check
      - act --bind --container-options "--user $(id -u):$(id -g)" workflow_dispatch -W .github/workflows/action-ci.yml --job stateful --matrix os:ubuntu-latest

  act:examples:
    desc: Run deploy-examples workflows locally via act (opens browser preview)
    deps: [act:check]
    cmds:
      - ./scripts/act-examples.sh {{.CLI_ARGS}}

  act:clean:
    desc: Clean up act test artifacts
    cmds:
      - rm -rf bench*.json index.html results/ bench-input.txt
