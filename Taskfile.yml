version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  init:
    desc: Install all dependencies
    cmds:
      - go mod tidy
      - go mod download
      - cd pkg/template/ui; pnpm install; cd -

  dev:ui:
    desc: Run development UI server
    cmds:
      - cd pkg/template/ui; pnpm dev --open

  build:ui:
    desc: Build Vue UI template
    cmds:
      - cd pkg/template/ui; SINGLEFILE=True pnpm build; cd -

  build:dev:
    desc: Build fast binary for development
    cmds:
      - go build -o ./bin/vizb .

  build:cli:
    desc: Build the binary (production-ready, stripped)
    cmds:
      - go build -ldflags="-s -w" -o ./bin/vizb

  build:
    desc: Build the UI & binary
    cmds:
      - task: build:ui
      - task: build:cli

  test:
    desc: Run all tests (no cache)
    cmds:
      - go test -count=1 -v ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  format:
    desc: Format codes
    cmds:
      - gofmt -w .
      - cd pkg/template/ui; pnpm format; cd -

  release:check:
    desc: Check Goreleaser configuration
    cmds:
      - goreleaser check

  release:snapshot:
    desc: Create a snapshot release
    cmds:
      - goreleaser release --snapshot --clean

  release:
    desc: Create and push a new tag to trigger release
    prompt: This will create and push a new release tag. Continue?
    vars:
      VERSION: "{{.CLI_ARGS}}"
    cmds:
      - task: release:check
      - task: release:snapshot
      - echo "Creating tag {{.VERSION}}..."
      - git tag -s {{.VERSION}} -m "Release {{.VERSION}}"
      - git push origin {{.VERSION}}
      - echo "Tag {{.VERSION}} pushed. GitHub Actions will create the release."

  ci-sim:
    desc: Simulate full CI pipeline locally (merge, prune, filter, html)
    deps: [build:dev]
    vars:
      OUT: "testdata/ci-output"
      BENCH: ".." # parent of ci-output/ = testdata/
      SORT: "--sort asc"
      UNITS: "--time-unit us --mem-unit KB"
      CHARTS: "--charts bar,line"
    cmds:
      - mkdir -p {{.OUT}}
      - |
        cd {{.OUT}} && \
        echo "--- v1.4.0 (fresh) ---" && \
        ../../bin/vizb ci {{.BENCH}}/bench-v1.4.0.txt --sha aaa --tag v1.4.0 --group-pattern n/y \
          {{.SORT}} {{.UNITS}} {{.CHARTS}} -o b.json && \
        echo "--- v1.5.0 (append) ---" && \
        ../../bin/vizb ci {{.BENCH}}/bench-v1.5.0.txt --sha bbb --tag v1.5.0 --group-pattern n/y \
          {{.SORT}} {{.UNITS}} {{.CHARTS}} --append b.json -o b.json && \
        echo "--- v1.6.0 (append) ---" && \
        ../../bin/vizb ci {{.BENCH}}/bench-v1.6.0.txt --sha ccc --tag v1.6.0 --group-pattern n/y \
          {{.SORT}} {{.UNITS}} {{.CHARTS}} --append b.json -o b.json && \
        echo "--- v1.6.1 (append + prune + filter) ---" && \
        ../../bin/vizb ci {{.BENCH}}/bench-v1.6.1.txt --sha ddd --tag v1.6.1 --group-pattern n/y \
          {{.SORT}} {{.UNITS}} {{.CHARTS}} \
           --append b.json -o b.json --keep 2 && \
        echo "--- Generate HTML viewer ---" && \
        ../../bin/vizb b.json -o index.html && \
        echo "" && \
        python3 -c "import json; d=json.load(open('b.json')); print(f'data points: {len(d[\"data\"])}'); print(f'tags: {sorted(d[\"runtimes\"].keys())}'); print(f'names: {sorted(set(x[\"name\"] for x in d[\"data\"]))}'); print(f'charts: {d[\"settings\"][\"charts\"]}'); print(f'sort: {d[\"settings\"][\"sort\"]}'); print(f'stats: {[s[\"type\"] for s in d[\"data\"][0][\"stats\"]][:3]}')" && \
        echo "" && \
        echo "Output: {{.OUT}}/"

  ci-clean:
    desc: Remove CI simulation output
    cmds:
      - rm -rf testdata/ci-output
