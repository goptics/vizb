name: Vizb Action
description: Run Go benchmarks and generate interactive HTML visualizations with vizb
branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  bench-cmd:
    description: "Benchmark command to run (e.g., go test -bench=.). Requires Go toolchain — add actions/setup-go before this action."
    default: ""
  bench-file:
    description: "Path to existing benchmark output file (takes priority over bench-cmd)"
    default: ""
  name:
    description: "Benchmark name (-n flag)"
    default: "Benchmarks"
  description:
    description: "Benchmark description (-d flag)"
    default: ""
  tag:
    description: "Tag/identifier for the benchmark (-t flag)"
    default: ""
  group-pattern:
    description: "Group pattern (-p flag)"
    default: "x"
  group-regex:
    description: "Group regex (-r flag)"
    default: ""
  scale:
    description: "Scale type: linear or log (-S flag)"
    default: linear
  sort:
    description: "Sort order: asc or desc (-s flag)"
    default: ""
  filter:
    description: "Regex filter for benchmarks (-f flag)"
    default: ""
  mem-unit:
    description: "Memory unit: b, B, KB, MB, GB (-M flag)"
    default: B
  time-unit:
    description: "Time unit: ns, us, ms, s (-T flag)"
    default: ns
  number-unit:
    description: "Number unit: K, M, B, T (-N flag)"
    default: ""
  charts:
    description: "Chart types to generate (-c flag)"
    default: "bar,line,pie"
  show-labels:
    description: "Show labels on charts (-l flag)"
    default: "false"
  merge-files:
    description: "Space-separated JSON files to merge"
    default: ""
  merge-dir:
    description: "Directory to scan for JSON files to merge"
    default: ""
  tag-axis:
    description: "Tag injection axis: n, x, or y (-A flag)"
    default: n
  output-json:
    description: "Path for JSON output file (leave empty to skip JSON generation)"
    default: ""
  output-html:
    description: "Path for HTML output file (leave empty to skip HTML generation)"
    default: ""
outputs:
  output-file-html:
    description: Path to HTML output file
    value: ${{ steps.generate-html.outputs.html }}
  output-file-json:
    description: Path to JSON output file
    value: ${{ steps.generate-json.outputs.json }}

runs:
  using: composite
  steps:
    - name: Resolve vizb version
      id: version
      shell: bash
      run: ${{ github.action_path }}/scripts/resolve-version.sh
      env:
        INPUT_ACTION_REF: ${{ github.action_ref }}
        GITHUB_ACTION_PATH: ${{ github.action_path }}

    - name: Cache vizb binary
      if: steps.version.outputs.is-latest != 'true'
      id: cache-vizb
      uses: actions/cache@v5
      with:
        path: ~/.local/bin/vizb
        key: vizb-${{ steps.version.outputs.tag }}-${{ runner.os }}-${{ runner.arch }}

    - name: Download vizb
      if: steps.cache-vizb.outputs.cache-hit != 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/download-vizb.sh
      env:
        INPUT_TAG: ${{ steps.version.outputs.tag }}
        INPUT_RUNNER_OS: ${{ runner.os }}
        INPUT_RUNNER_ARCH: ${{ runner.arch }}

    - name: Show vizb version
      if: steps.version.outputs.is-latest == 'true'
      shell: bash
      run: echo "::notice::$(vizb -v 2>&1)"

    # ── Resolve input source ───────────────────────────────────

    - name: Resolve input
      id: resolve
      shell: bash
      run: ${{ github.action_path }}/scripts/resolve-input.sh
      env:
        INPUT_BENCH_FILE: ${{ inputs.bench-file }}
        INPUT_BENCH_CMD: ${{ inputs.bench-cmd }}
        INPUT_MERGE_FILES: ${{ inputs.merge-files }}
        INPUT_MERGE_DIR: ${{ inputs.merge-dir }}

    # ── Convert to JSON ────────────────────────────────────────

    - name: Convert to JSON
      id: convert
      if: steps.resolve.outputs.has_input == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/convert-bench.sh
      env:
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_DESCRIPTION: ${{ inputs.description }}
        INPUT_GROUP_PATTERN: ${{ inputs.group-pattern }}
        INPUT_GROUP_REGEX: ${{ inputs.group-regex }}
        INPUT_SCALE: ${{ inputs.scale }}
        INPUT_SORT: ${{ inputs.sort }}
        INPUT_FILTER: ${{ inputs.filter }}
        INPUT_MEM_UNIT: ${{ inputs.mem-unit }}
        INPUT_TIME_UNIT: ${{ inputs.time-unit }}
        INPUT_NUMBER_UNIT: ${{ inputs.number-unit }}
        INPUT_CHARTS: ${{ inputs.charts }}
        INPUT_SHOW_LABELS: ${{ inputs.show-labels }}
        INPUT_BENCH_FILE: ${{ inputs.bench-file }}
        INPUT_BENCH_CMD: ${{ inputs.bench-cmd }}
        INPUT_SOURCE: ${{ steps.resolve.outputs.source }}

    # ── Merge ──────────────────────────────────────────────────

    - name: Merge
      if: inputs.merge-files != '' || inputs.merge-dir != ''
      id: merge
      shell: bash
      run: ${{ github.action_path }}/scripts/merge-bench.sh
      env:
        INPUT_MERGE_FILES: ${{ inputs.merge-files }}
        INPUT_MERGE_DIR: ${{ inputs.merge-dir }}
        INPUT_TAG_AXIS: ${{ inputs.tag-axis }}

    # ── Generate output ────────────────────────────────────────

    - name: Generate HTML
      id: generate-html
      if: inputs.output-html != ''
      shell: bash
      run: |
        mkdir -p "$(dirname "${{ inputs.output-html }}")"
        vizb html bench.json -o "${{ inputs.output-html }}"
        echo "html=${{ inputs.output-html }}" >> "$GITHUB_OUTPUT"

    - name: Generate JSON
      id: generate-json
      if: inputs.output-json != ''
      shell: bash
      run: |
        mkdir -p "$(dirname "${{ inputs.output-json }}")"
        cp bench.json "${{ inputs.output-json }}"
        echo "json=${{ inputs.output-json }}" >> "$GITHUB_OUTPUT"
