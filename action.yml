name: Vizb Action
description: Turn CSV/JSON tabular data or benchmark output (Go, Rust, JavaScript) into interactive HTML visualizations with vizb
author: fahimfaisaal
branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  cmd:
    description: "Command whose stdout is visualized — any command emitting CSV/JSON tabular data or benchmark output (e.g., go test -bench=., cargo bench, cat data.csv)."
    default: ""
  file:
    description: "Path to an existing input file to visualize — benchmark output, CSV, or JSON (takes priority over cmd)"
    default: ""
  bench-cmd:
    description: "DEPRECATED: use 'cmd'. Command to run; honored only when 'cmd' is empty." # remove on v1
    default: ""
  bench-file:
    description: "DEPRECATED: use 'file'. Existing input file; honored only when 'file' is empty." # remove on v1
    default: ""
  name:
    description: "Dataset/benchmark name (-n flag)"
    default: "Comparisons"
  description:
    description: "Dataset/benchmark description (-d flag)"
    default: ""
  tag:
    description: "Tag/identifier for the dataset (-t flag)"
    default: ""
  group:
    description: "Column/field names merged into the group name; forwarded as -g (accepts space- or comma-separated, e.g. 'name category region' or 'name,category/region'); parsed by -p/-r. Omit for csv/json to let vizb auto-group the most-unique categorical column onto the X axis"
    default: ""
  group-pattern:
    description: "Group pattern (-p flag)"
    default: "x"
  group-regex:
    description: "Group regex (-r flag)"
    default: ""
  sort:
    description: "DEPRECATED: use 'chart' input instead (e.g. chart: 'bar:sort=asc'). Sort order: asc or desc (-s flag)"
    default: ""
  filter:
    description: "Regex to include only matching rows (CSV/JSON: --group label) or benchmark names (-f flag)"
    default: ""
  mem-unit:
    description: "Memory unit: b, B, KB, MB, GB (-M flag)"
    default: B
  time-unit:
    description: "Time unit: ns, us, ms, s (-T flag)"
    default: ns
  number-unit:
    description: "Number unit: K, M, B, T (-N flag)"
    default: ""
  select:
    description: "csv/json only: select value columns; optional rename with {label} (e.g. 'price{Unit price},count') (--select flag)"
    default: ""
  json-path:
    description: "json only: select a nested array to chart via a jq-like dot path (e.g. '.data.results') (--json-path flag)"
    default: ""
  stat:
    description: "Enable stats panel (--stat flag). Empty = disabled; 'all' or 'true' = all categories; otherwise comma-separated from: counts, center, spread, extremes, shape, percentiles, confidence, correlations"
    default: ""
  chart:
    description: "Per-chart overrides (--chart flag, repeatable). One override per line: '<type>:<key>=<val>,...'. Keys: swap, sort, scale, labels, 3d-rotate, 3d. E.g. 'bar:scale=log' or 'pie:labels'. Blank lines and #-prefixed lines are ignored."
    default: ""
  charts:
    description: "Chart types to generate (-c flag): bar, line, scatter, pie, heatmap, radar"
    default: ""
  parser:
    description: "Parser to use: csv, json, go, js:tinybench, js:vitest, rs:criterion, rs:divan (-P flag)"
    default: "auto"
  show-labels:
    description: "DEPRECATED: use 'chart' input instead (e.g. chart: 'pie:labels'). Show labels on charts (-l flag)"
    default: "false"
  enable-3d:
    description: "Bundle the 3D renderer for vizb ui (--3d flag, mainly useful with data-url when remote data shape is unknown at build time)"
    default: "false"
  merge-files:
    description: "Space-separated JSON files to merge"
    default: ""
  merge-dir:
    description: "Directory to scan for JSON files to merge"
    default: ""
  tag-axis:
    description: "Tag injection axis: n, x, y, or z (-A flag)"
    default: n
  output-json:
    description: "Path for JSON output file (leave empty to skip JSON generation)"
    default: ""
  output-html:
    description: "Path for HTML output file (leave empty to skip HTML generation)"
    default: ""
  data-url:
    description: "URL to fetch vizb JSON from at runtime (-U flag). When set, no input file is needed and the HTML fetches data remotely."
    default: ""
  vizb-binary:
    description: "Path to a pre-built vizb binary on the runner. When set, skips release download/cache and installs this binary instead — useful for testing local builds or unreleased changes."
    default: ""
outputs:
  output-file-html:
    description: Path to HTML output file
    value: ${{ inputs.output-html }}
  output-file-json:
    description: Path to JSON output file
    value: ${{ inputs.output-json }}

runs:
  using: composite
  steps:
    - name: Resolve vizb version
      id: version
      shell: bash
      run: |
        REF="${{ github.action_ref }}"
        if [ -z "$REF" ]; then
          REF="v0"
        fi

        if echo "$REF" | grep -qE '^v[0-9]+$'; then
          PREFIX="${REF#v}"
          TAG=$(git ls-remote --tags --refs --sort='-version:refname' \
            https://github.com/goptics/vizb "refs/tags/v${PREFIX}.*" | \
            head -1 | sed 's|.*/||')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is-major=true" >> "$GITHUB_OUTPUT"
        else
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "is-major=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Cache vizb binary
      if: steps.version.outputs.is-major != 'true' && inputs.vizb-binary == ''
      id: cache-vizb
      uses: actions/cache@v6
      with:
        path: ~/.local/bin/vizb
        key: vizb-${{ steps.version.outputs.tag }}-${{ runner.os }}-${{ runner.arch }}

    - name: Install vizb
      if: steps.cache-vizb.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p ~/.local/bin

        VIZB_BINARY="${{ inputs.vizb-binary }}"
        if [ -n "$VIZB_BINARY" ]; then
          echo "::notice::Installing local vizb binary from $VIZB_BINARY"
          cp "$VIZB_BINARY" ~/.local/bin/vizb
          chmod +x ~/.local/bin/vizb
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          exit 0
        fi

        OS=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
        [ "$OS" = "macos" ] && OS="darwin"
        ARCH=$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')
        [ "$ARCH" = "x64" ] && ARCH="amd64"

        TAG="${{ steps.version.outputs.tag }}"
        VERSION="${TAG#v}"
        EXT=".tar.gz"
        [ "$OS" = "windows" ] && EXT=".zip"

        URL="https://github.com/goptics/vizb/releases/download/${TAG}/vizb@${VERSION}-${OS}-${ARCH}${EXT}"

        curl -sfL "$URL" -o vizb-archive || {
          echo "::error::Failed to download vizb from $URL. Check that release ${TAG} exists."
          exit 1
        }

        if [ "$OS" = "windows" ]; then
          unzip -o vizb-archive -d ~/.local/bin
        else
          tar xzf vizb-archive -C ~/.local/bin
          chmod +x ~/.local/bin/vizb
        fi

        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Resolve input
      id: resolve
      shell: bash
      run: |
        cat > "$RUNNER_TEMP/vizb-chart-flags.sh" <<'EOF'
        append_chart_stat_flags() {
          local _args_name=$1
          local _charts="$2" _chart_input="$3" _stat_val="$4"
          if [ -n "$_charts" ]; then
            eval "${_args_name}+=( -c $(printf '%q' "$_charts") )"
          fi
          while IFS= read -r line; do
            line="${line#"${line%%[![:space:]]*}"}"
            [ -z "$line" ] && continue
            case "$line" in \#*) continue ;; esac
            eval "${_args_name}+=( --chart $(printf '%q' "$line") )"
          done <<< "$_chart_input"
          if [ "$_stat_val" = "all" ] || [ "$_stat_val" = "true" ]; then
            eval "${_args_name}+=( --stat )"
          elif [ -n "$_stat_val" ]; then
            eval "${_args_name}+=( $(printf '%q' "--stat=${_stat_val}") )"
          fi
        }
        EOF

        # New generic inputs take priority; fall back to deprecated bench-* aliases.
        FILE="${{ inputs.file }}"
        [ -z "$FILE" ] && FILE="${{ inputs.bench-file }}"
        CMD="${{ inputs.cmd }}"
        [ -z "$CMD" ] && CMD="${{ inputs.bench-cmd }}"

        if [ -n "$FILE" ] || [ -n "$CMD" ]; then
          echo "has_input=true" >> "$GITHUB_OUTPUT"
        elif [ -n "${{ inputs.merge-files }}" ] || [ -n "${{ inputs.merge-dir }}" ] || [ -n "${{ inputs.data-url }}" ]; then
          echo "has_input=false" >> "$GITHUB_OUTPUT"
        else
          echo "::error::No input provided. Specify cmd, file, merge-files, merge-dir, or data-url."
          exit 1
        fi

        {
          echo "file<<__VIZB_EOF__"
          echo "$FILE"
          echo "__VIZB_EOF__"
          echo "cmd<<__VIZB_EOF__"
          echo "$CMD"
          echo "__VIZB_EOF__"
        } >> "$GITHUB_OUTPUT"

        OUT_JSON="${{ inputs.output-json }}"
        if [ -n "$OUT_JSON" ]; then
          echo "json_file=$OUT_JSON" >> "$GITHUB_OUTPUT"
        else
          echo "json_file=bench.json" >> "$GITHUB_OUTPUT"
        fi

    - name: Convert to JSON
      id: convert
      if: steps.resolve.outputs.has_input == 'true'
      shell: bash
      run: |
        source "$RUNNER_TEMP/vizb-chart-flags.sh"
        VIZB_ARGS=()
        [ -n "${{ inputs.tag }}" ] && VIZB_ARGS+=(--tag "${{ inputs.tag }}")
        [ -n "${{ inputs.name }}" ] && VIZB_ARGS+=(-n "${{ inputs.name }}")
        [ -n "${{ inputs.description }}" ] && VIZB_ARGS+=(-d "${{ inputs.description }}")
        [ -n "${{ inputs.group }}" ] && VIZB_ARGS+=(-g "${{ inputs.group }}")
        [ -n "${{ inputs.group-pattern }}" ] && VIZB_ARGS+=(-p "${{ inputs.group-pattern }}")
        [ -n "${{ inputs.group-regex }}" ] && VIZB_ARGS+=(-r "${{ inputs.group-regex }}")
        [ -n "${{ inputs.sort }}" ] && VIZB_ARGS+=(--sort "${{ inputs.sort }}")
        [ -n "${{ inputs.filter }}" ] && VIZB_ARGS+=(--filter "${{ inputs.filter }}")
        [ -n "${{ inputs.mem-unit }}" ] && VIZB_ARGS+=(-M "${{ inputs.mem-unit }}")
        [ -n "${{ inputs.time-unit }}" ] && VIZB_ARGS+=(-T "${{ inputs.time-unit }}")
        [ -n "${{ inputs.number-unit }}" ] && VIZB_ARGS+=(-N "${{ inputs.number-unit }}")
        [ -n "${{ inputs.select }}" ] && VIZB_ARGS+=(--select "${{ inputs.select }}")
        [ -n "${{ inputs.json-path }}" ] && VIZB_ARGS+=(--json-path "${{ inputs.json-path }}")
        [ "${{ inputs.show-labels }}" = "true" ] && VIZB_ARGS+=(-l)
        [ -n "${{ inputs.parser }}" ] && VIZB_ARGS+=(-P "${{ inputs.parser }}")
        append_chart_stat_flags VIZB_ARGS "${{ inputs.charts }}" "${{ inputs.chart }}" "${{ inputs.stat }}"

        if [ -n "${{ steps.resolve.outputs.file }}" ]; then
          INPUT="${{ steps.resolve.outputs.file }}"
        else
          INPUT="${RUNNER_TEMP}/vizb-data-input-$$.txt"
          ${{ steps.resolve.outputs.cmd }} > "$INPUT"
        fi

        vizb "$INPUT" -o "${{ steps.resolve.outputs.json_file }}" "${VIZB_ARGS[@]}"

    - name: Merge
      if: inputs.merge-files != '' || inputs.merge-dir != ''
      id: merge
      shell: bash
      run: |
        JSON_FILE="${{ steps.resolve.outputs.json_file }}"
        FILES=()
        [ -f "$JSON_FILE" ] && FILES+=("$JSON_FILE")
        [ -n "${{ inputs.merge-files }}" ] && FILES+=(${{ inputs.merge-files }})
        [ -n "${{ inputs.merge-dir }}" ] && FILES+=("${{ inputs.merge-dir }}")
        vizb merge "${FILES[@]}" -o "$JSON_FILE" --tag-axis "${{ inputs.tag-axis }}"

    - name: Generate HTML
      if: inputs.output-html != ''
      shell: bash
      run: |
        source "$RUNNER_TEMP/vizb-chart-flags.sh"
        VIZB_UI_ARGS=()
        append_chart_stat_flags VIZB_UI_ARGS "${{ inputs.charts }}" "${{ inputs.chart }}" "${{ inputs.stat }}"
        [ "${{ inputs.enable-3d }}" = "true" ] && VIZB_UI_ARGS+=(--3d)

        if [ -n "${{ inputs.data-url }}" ]; then
          vizb ui -U "${{ inputs.data-url }}" -o "${{ inputs.output-html }}" "${VIZB_UI_ARGS[@]}"
        else
          vizb ui "${{ steps.resolve.outputs.json_file }}" -o "${{ inputs.output-html }}" "${VIZB_UI_ARGS[@]}"
        fi
